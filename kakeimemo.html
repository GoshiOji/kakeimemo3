  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --acc:#FF8C69;--acc2:#FF6B4A;--dark:#2C2424;--bg:#FFF5F0;
      --card:#fff;--border:#F0E6E0;--text:#2C2424;--muted:#9E8880;
      --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Noto Sans JP',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;}
    #app{height:100vh;height:100dvh;display:flex;flex-direction:column;}
    #scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + var(--sb));}
    .content{max-width:480px;margin:0 auto;padding:14px 13px;}

    /* ヘッダー */
    .hdr{background:linear-gradient(135deg,#FF9A7B,#FF6B4A);padding:calc(10px + var(--st)) 16px 12px;position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(255,107,74,.3);}
    .hdr-in{display:flex;align-items:center;justify-content:space-between;max-width:480px;margin:0 auto;}
    .hdr-title{font-size:19px;font-weight:700;color:#fff;letter-spacing:.04em;}
    .hdr-sub{font-size:10px;color:rgba(255,255,255,.65);margin-top:1px;letter-spacing:.08em;}
    .tab-wrap{display:flex;gap:5px;}
    .tab-btn{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.45);color:#fff;border-radius:13px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .18s;}
    .tab-btn.act{background:#fff;color:var(--acc2);border-color:#fff;font-weight:700;}
    .gear-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:9px;padding:6px 10px;font-size:16px;cursor:pointer;}

    /* 同期ステータスバー */
    #sync-bar{font-size:11px;padding:5px 16px;display:flex;align-items:center;gap:6px;max-width:480px;margin:0 auto;}
    .sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

    .content{max-width:480px;margin:0 auto;padding:14px 13px;}

    /* 月バー */
    .mbar{display:flex;gap:7px;margin-bottom:16px;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:3px;}
    .mbar::-webkit-scrollbar{display:none;}
    .ysel{background:#fff;border:1px solid var(--border);border-radius:9px;padding:7px 10px;font-size:13px;cursor:pointer;font-family:inherit;flex-shrink:0;color:var(--text);outline:none;-webkit-appearance:none;}
    .mbtns{display:flex;gap:4px;}
    .mbtn{background:#fff;border:1px solid var(--border);border-radius:7px;padding:6px 8px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--muted);white-space:nowrap;transition:all .15s;flex-shrink:0;}
    .mbtn.act{background:var(--dark);color:#fff;border-color:var(--dark);font-weight:700;}

    /* 合計カード */
    .tot-card{background:linear-gradient(135deg,#2C2424,#3D3030);border-radius:16px;padding:20px 18px;margin-bottom:14px;color:#fff;box-shadow:0 4px 18px rgba(44,36,36,.2);}
    .tot-lbl{font-size:11px;opacity:.5;letter-spacing:.1em;margin-bottom:5px;}
    .tot-num{font-size:32px;font-weight:700;letter-spacing:-.02em;}
    .cbar{display:flex;height:4px;border-radius:2px;overflow:hidden;margin-top:12px;gap:1px;}
    .pchips{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;}
    .pchip{background:rgba(255,255,255,.11);border-radius:7px;padding:4px 9px;font-size:11px;}

    /* フォームカード */
    .fcard{background:#fff;border-radius:13px;padding:14px;margin-bottom:13px;border:1px solid var(--border);box-shadow:0 2px 7px rgba(0,0,0,.04);}
    .flbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-bottom:11px;}
    .frow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
    .frow:last-child{margin-bottom:0;}
    .fi{background:#FFF8F5;border:1px solid var(--border);border-radius:9px;padding:10px 11px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border .15s;-webkit-appearance:none;appearance:none;}
    .fi:focus{border-color:var(--acc);}
    .fi-cat{flex:0 0 auto;}
    .fi-amt{flex:1 1 95px;}
    .fi-memo{flex:2 1 110px;}
    .fi-store{flex:2 1 140px;}
    .fi-pay{flex:1 1 115px;}
    .fi-date{flex:1 1 130px;color:var(--text);}
    .add-btn{background:linear-gradient(135deg,#FF9A7B,#FF6B4A);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:700;flex-shrink:0;box-shadow:0 3px 9px rgba(255,107,74,.35);touch-action:manipulation;}
    .add-btn:active{opacity:.88;transform:scale(.97);}

    /* フィルター */
    .pfwrap{display:flex;gap:5px;margin-bottom:13px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
    .pfwrap::-webkit-scrollbar{display:none;}
    .pfbtn{border-radius:15px;padding:6px 13px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;border:1.5px solid;white-space:nowrap;flex-shrink:0;}

    /* カテゴリグリッド */
    .cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:8px;margin-bottom:13px;}
    .ccard{background:#fff;border-radius:9px;padding:11px 13px;border:1px solid var(--border);border-left-width:3px;}
    .ccard-ico{font-size:16px;margin-bottom:3px;}
    .ccard-lbl{font-size:10px;color:var(--muted);margin-bottom:2px;}
    .ccard-amt{font-size:14px;font-weight:700;}

    /* 支出リスト */
    .lcard{background:#fff;border-radius:13px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 7px rgba(0,0,0,.04);}
    .lhdr{padding:10px 13px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.08em;}
    .litem{display:flex;align-items:center;gap:9px;padding:11px 13px;transition:background .1s;}
    .litem:active{background:#FFF0EB;}
    .lico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
    .linf{flex:1;min-width:0;}
    .lname{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lmeta{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-top:2px;}
    .badge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 6px;}
    .ldate{font-size:10px;color:var(--muted);}
    .lamt{font-weight:700;font-size:14px;flex-shrink:0;}
    .delbtn{background:none;border:none;font-size:19px;color:#DDD;cursor:pointer;padding:3px;flex-shrink:0;}
    .delbtn:active{color:var(--acc2);}

    /* 空 */
    .empty{text-align:center;padding:44px 0;color:#CCC;font-size:13px;}
    .empty-ico{font-size:34px;margin-bottom:9px;}

    /* 年間 */
    .ycrd{background:linear-gradient(135deg,#2C2424,#3D3030);border-radius:16px;padding:20px 18px;margin-bottom:14px;color:#fff;box-shadow:0 4px 18px rgba(44,36,36,.2);}
    .barchart{display:flex;align-items:flex-end;gap:3px;height:108px;}
    .bcol{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;gap:2px;}
    .bval{font-size:8px;color:#aaa;}
    .bbody{width:100%;border-radius:3px 3px 0 0;transition:height .35s ease;min-height:3px;}
    .blbl{font-size:8px;}
    .ytbl{background:#fff;border-radius:13px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 7px rgba(0,0,0,.04);}
    .yrow{display:flex;align-items:center;gap:9px;padding:12px 13px;border-bottom:1px solid #FBF5F2;cursor:pointer;}
    .yrow:last-child{border-bottom:none;}
    .yrow:active,.yrow.sel{background:#FFF5F0;}
    .yrm{width:26px;font-size:12px;font-weight:700;flex-shrink:0;}
    .yrchips{flex:1;display:flex;gap:3px;flex-wrap:wrap;}
    .yrtot{font-size:13px;font-weight:700;flex-shrink:0;}

    /* オプションシート */
    .opt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:flex;align-items:flex-end;}
    .opt-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(20px + var(--sb));animation:slideUp .28s ease;}
    .opt-handle{width:36px;height:4px;background:#DDD;border-radius:2px;margin:12px auto 0;}
    .opt-title{font-size:16px;font-weight:700;padding:16px 18px 10px;border-bottom:1px solid var(--border);}
    .opt-section{padding:14px 18px;}
    .opt-sec-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;}
    .pay-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #FAF4F0;}
    .pay-item:last-child{border-bottom:none;}
    .pay-ico-preview{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .pay-item-info{flex:1;}
    .pay-item-name{font-size:14px;font-weight:600;}
    .pay-del-btn{background:none;border:none;font-size:20px;color:#CCC;cursor:pointer;padding:4px;}
    .pay-del-btn:active{color:#FF4444;}
    .add-pay-form{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
    .opt-fi{background:#FFF8F5;border:1px solid var(--border);border-radius:9px;padding:10px 11px;font-size:14px;font-family:inherit;color:var(--text);outline:none;-webkit-appearance:none;}
    .opt-fi:focus{border-color:var(--acc);}
    .opt-add-btn{background:linear-gradient(135deg,#FF9A7B,#FF6B4A);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
    .opt-add-btn:active{opacity:.88;}
    .color-swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
    .swatch{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;}
    .swatch.sel{border-color:#333;}
    .ico-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
    .ico-opt{font-size:20px;padding:4px;cursor:pointer;border-radius:6px;border:2px solid transparent;}
    .ico-opt.sel{border-color:var(--acc2);}
    .close-btn{background:none;border:1px solid var(--border);border-radius:9px;padding:10px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--muted);width:100%;margin-top:4px;font-weight:600;}
    .close-btn:active{background:#FFF0EB;}

    /* ローディング */
    #loading{position:fixed;inset:0;background:linear-gradient(135deg,#FF9A7B,#FF6B4A);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:#fff;}
    #loading .ld-ico{font-size:56px;margin-bottom:16px;animation:pulse 1.2s infinite;}
    #loading .ld-txt{font-size:18px;font-weight:700;letter-spacing:.06em;}
    #loading .ld-sub{font-size:12px;opacity:.7;margin-top:6px;}
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
    .fu{animation:fadeUp .25s ease;}
    @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}

    /* スワイプ操作 */
    .swipe-wrap{position:relative;overflow:hidden;border-bottom:1px solid #FBF5F2;}
    .swipe-wrap:last-child{border-bottom:none;}
    .swipe-actions{position:absolute;top:0;bottom:0;display:flex;align-items:stretch;}
    .swipe-del{background:#FF3B30;color:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;min-width:72px;font-size:10px;font-weight:700;cursor:pointer;user-select:none;}
    .swipe-edit{background:#FF8C69;color:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;min-width:72px;font-size:10px;font-weight:700;cursor:pointer;user-select:none;}
    .swipe-del-ico{font-size:20px;}
    .swipe-edit-ico{font-size:20px;}
    .swipe-content{background:#fff;transition:transform .22s ease;touch-action:pan-y;}
    .swipe-content.swiping{transition:none;}

    /* 編集モーダル */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;}
    .modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;padding:0 0 calc(20px + var(--sb));animation:slideUp .25s ease;max-height:90vh;overflow-y:auto;}
    .modal-handle{width:36px;height:4px;background:#DDD;border-radius:2px;margin:12px auto 0;}
    .modal-title{font-size:15px;font-weight:700;padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .modal-close{background:none;border:none;font-size:22px;color:#CCC;cursor:pointer;padding:0 4px;}
    .modal-body{padding:16px 18px;}
    .modal-row{margin-bottom:12px;}
    .modal-lbl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em;margin-bottom:5px;}
    .modal-fi{width:100%;background:#FFF8F5;border:1px solid var(--border);border-radius:9px;padding:11px 12px;font-size:14px;font-family:inherit;color:var(--text);outline:none;-webkit-appearance:none;}
    .modal-fi:focus{border-color:var(--acc);}
    .modal-save-btn{width:100%;background:linear-gradient(135deg,#FF9A7B,#FF6B4A);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;box-shadow:0 3px 10px rgba(255,107,74,.3);}
    .modal-save-btn:active{opacity:.88;}

    /* 固定費・履歴ビュー */
    .fixed-card{background:#fff;border-radius:13px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);box-shadow:0 2px 7px rgba(0,0,0,.04);}
    .fixed-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #FBF5F2;}
    .fixed-row:last-child{border-bottom:none;}
    .fixed-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .fixed-name{flex:1;font-size:13px;font-weight:500;}
    .fixed-amt{font-size:14px;font-weight:700;flex-shrink:0;}
    .trend-up{color:#E05555;font-size:11px;font-weight:700;}
    .trend-dn{color:#3D8A60;font-size:11px;font-weight:700;}
    .trend-eq{color:#999;font-size:11px;}
    .hist-card{background:#fff;border-radius:13px;border:1px solid var(--border);overflow:hidden;margin-bottom:13px;box-shadow:0 2px 7px rgba(0,0,0,.04);}
    .hist-hdr{padding:10px 14px;background:#FFF8F5;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.08em;}
    .hist-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #FBF5F2;font-size:13px;}
    .hist-row:last-child{border-bottom:none;}
    .hist-item{flex:1;color:var(--muted);}
    .hist-amt{font-weight:700;min-width:80px;text-align:right;}
    .hist-prev{font-size:11px;min-width:70px;text-align:right;}
    .hist-yoy{font-size:11px;min-width:70px;text-align:right;}
    .summary-chip{display:inline-flex;align-items:center;gap:4px;background:#FFF0EB;border-radius:8px;padding:5px 10px;font-size:12px;color:var(--acc2);font-weight:700;margin-right:6px;margin-bottom:6px;}

    /* 入力者選択 */
    .user-bar{display:flex;gap:8px;align-items:center;padding:8px 16px 6px;max-width:480px;margin:0 auto;}
    .user-btn{border-radius:20px;padding:6px 18px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;border:2px solid;transition:all .18s;flex-shrink:0;letter-spacing:.04em;}
    .user-btn.sasaki{border-color:#FF8C69;color:#FF6B4A;background:#fff;}
    .user-btn.sasaki.act{background:#FF8C69;color:#fff;box-shadow:0 2px 8px rgba(255,140,105,.4);}
    .user-btn.yamamo{border-color:#5A9E7C;color:#3D8A60;background:#fff;}
    .user-btn.yamamo.act{background:#5A9E7C;color:#fff;box-shadow:0 2px 8px rgba(90,158,124,.4);}
    .user-lbl{font-size:11px;color:rgba(255,255,255,.6);margin-right:2px;}
    .user-badge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;}
  </style>
</head>
<body>

<!-- ローディング画面 -->
<div id="loading">
  <div class="ld-ico">🏠</div>
  <div class="ld-txt">家計メモ</div>
  <div class="ld-sub">データを読み込み中...</div>
</div>

<div id="app" style="display:none">
  <header class="hdr">
    <div class="hdr-in">
      <div>
        <div class="hdr-title">🏠 家計メモ</div>
        <div class="hdr-sub">MONTHLY EXPENSE TRACKER</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <div class="tab-wrap">
          <button class="tab-btn act" id="tab-month" onclick="setView('month')">月別</button>
          <button class="tab-btn" id="tab-summary" onclick="setView('summary')">年間</button>
          <button class="tab-btn" id="tab-fixed" onclick="setView('fixed')">固定費</button>
        </div>
        <button class="gear-btn" onclick="openOpt()">⚙️</button>
      </div>
    </div>
    <!-- 同期ステータス -->
    <div id="sync-bar">
      <div class="sync-dot" id="sync-dot" style="background:#aaa"></div>
      <span id="sync-txt" style="color:rgba(255,255,255,.7)">接続中...</span>
    </div>
    <!-- 入力者選択 -->
    <div class="user-bar">
      <span class="user-lbl">入力者：</span>
      <button class="user-btn sasaki act" id="btn-sasaki" onclick="selectUser('sasaki')">ささき</button>
      <button class="user-btn yamamo" id="btn-yamamo" onclick="selectUser('yamamo')">やまも</button>
    </div>
  </header>
  <div id="scroll-area">
    <div class="content" id="mc"></div>
  </div>
</div>

<!-- オプションオーバーレイ -->
<div id="opt-overlay" class="opt-overlay" style="display:none" onclick="if(event.target===this)closeOpt()">
  <div class="opt-sheet" id="opt-sheet">
    <div class="opt-handle"></div>
    <div class="opt-title">⚙️ オプション設定</div>
    <div id="opt-body"></div>
  </div>
</div>

<!-- Firebase SDK (compat版) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

// 表示上の「月」はスプレッドシートの月と対応
function getHistTotal(year, month) {
  const key = `${year}-${month}`;
  const d = HIST_DATA[key];
  if(!d) return null;
  return (d.電気代||0)+(d.水道代||0)+(d.ガス代||0)+(d.食費||0)+(d.家賃 != null ? d.家賃 : 0);
}
// 固定費（家賃83,590円）をスプレッドシート全期間（2023-2〜2026-4）に自動加算して返す
function getHistData(year, month) {
  const raw = HIST_DATA[`${year}-${month}`];
  if(!raw) return null;
  // データが無い項目（2023年2月など）なら家賃も付与しない
  const hasAnyValue = (raw.電気代!=null || raw.水道代!=null || raw.ガス代!=null || raw.食費!=null);
  if(!hasAnyValue) return raw;
  return { ...raw, 家賃: FIXED_TOTAL };
}

// 締め日（17日）ベースで「現在入力対象となる月」を返す
// 18日以降 → 翌月ページ、1〜17日 → 当月ページ
function getBillingMonth(){
  const d = new Date();
  const day = d.getDate();
  const month = d.getMonth();
  const year = d.getFullYear();
  if(day >= 18){
    // 翌月
    if(month === 11) return {year: year+1, month: 0};
    return {year, month: month+1};
  }
  return {year, month};
}

// 入力された日付から計上月を返す（17日締め）
function getBillingMonthFromDate(dateStr){
  if(!dateStr) return {year:today.getFullYear(), month:today.getMonth()};
  const [y,m,d] = dateStr.split('-').map(Number);
  const day = d, month = m-1, year = y;
  if(day >= 18){
    if(month === 11) return {year: year+1, month: 0};
    return {year, month: month+1};
  }
  return {year, month};
}

let unsubscribeExpenses = null;
let unsubscribePayments = null;
let subscribedMonthKey = null;

function subscribeMonth(year, month){
  const key = `${year}-${month}`;

  // 既に購読中の月と同じならスキップ（無駄な再購読防止）
  if(subscribedMonthKey === key) return;
  subscribedMonthKey = key;

  // 前のリスナーを解除
  if(unsubscribeExpenses) unsubscribeExpenses();

  if(!firebaseReady){ setSyncStatus(false); if(S.expenses[key]===undefined) S.expenses[key]={}; render(); return; }

  unsubscribeExpenses = db.collection("expenses").doc(key).collection("items").onSnapshot(
    (snap) => {
      S.expenses[key] = {};
      snap.forEach(d => { S.expenses[key][d.id] = d.data(); });
      setSyncStatus(true);
      if(S.view==="month" && curKey()===key) render();
    },
    (err) => {
      console.error(err);
      setSyncStatus(false);
    }
  );
}

function subscribePayments(){
  if(unsubscribePayments) unsubscribePayments();
  if(!firebaseReady){ return; }
  const docRef = db.collection("settings").doc("payments");
  unsubscribePayments = docRef.onSnapshot(
    (snap) => {
      if(snap.exists && snap.data() && snap.data().list){
        S.payments = snap.data().list;
        if(!S.form.payment || !S.payments.find(p=>p.id===S.form.payment)){
          S.form.payment = S.payments[0]?.id || "";
        }
      }
      render();
    },
    (err) => { console.error(err); }
  );
}

// ── スワイプ処理 ─────────────────────────
function attachSwipe(wrap, onSwipeRight, onSwipeLeft){
  let startX=0, startY=0, curX=0, isDragging=false, lockAxis=null;
  const content = wrap.querySelector(".swipe-content");
  const THRESHOLD = 72;

  function onStart(x,y){ startX=x; startY=y; curX=0; isDragging=true; lockAxis=null; content.classList.add("swiping"); }
  function onMove(x,y){
    if(!isDragging) return;
    const dx=x-startX, dy=y-startY;
    if(!lockAxis){ lockAxis = Math.abs(dx)>Math.abs(dy)?"h":"v"; }
    if(lockAxis==="v"){ content.style.transform=""; return; }
    curX=dx;
    content.style.transform=`translateX(${curX}px)`;
  }
  function onEnd(){
    if(!isDragging) return;
    isDragging=false; lockAxis=null; content.classList.remove("swiping");
    content.style.transform="";
    if(curX > THRESHOLD){ onSwipeRight(); }
    else if(curX < -THRESHOLD){ onSwipeLeft(); }
  }
  wrap.addEventListener("touchstart",e=>{ if(e.touches.length===1) onStart(e.touches[0].clientX,e.touches[0].clientY); },{passive:true});
  wrap.addEventListener("touchmove",e=>{ if(lockAxis==="h") e.preventDefault(); onMove(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
  wrap.addEventListener("touchend",onEnd);
  wrap.addEventListener("mousedown",e=>onStart(e.clientX,e.clientY));
  wrap.addEventListener("mousemove",e=>{ if(isDragging) onMove(e.clientX,e.clientY); });
  wrap.addEventListener("mouseup",onEnd);
  wrap.addEventListener("mouseleave",onEnd);
}

  attachSwipe(wrap,
    ()=>confirmDelete(id),
    ()=>openEditModal(id)
  );
  return wrap;
}

window.confirmDelete = function(id){
  const entry = S.expenses[curKey()]?.[id];
  if(!entry) return;
  const label = entry.store || CATEGORIES.find(c=>c.id===entry.category)?.label || "この支出";
  if(confirm(`「${label}」を削除しますか？`)){
    deleteExpense(id);
  }
};
window.formChange = function(f, v){ S.form[f] = v; };

window.addExpense = async function(){
  const amt = Number(S.form.amount);
  if(!amt || amt <= 0){ document.querySelectorAll(".fi-amt").forEach(el=>{el.style.borderColor="#FF6B4A";setTimeout(()=>{el.style.borderColor="";},1200);}); return; }
  if(!S.form.payment){ alert("支払い方法を選んでください"); return; }
  const dateStr = S.form.date || todayStr();
  const billing = getBillingMonthFromDate(dateStr);
  const entry = {
    id: Date.now(),
    category: S.form.category,
    amount: amt,
    memo: S.form.memo,
    store: S.form.store,
    payment: S.form.payment,
    date: dateStr,
    user: S.form.user || "sasaki",
  };
  S.form = { ...S.form, amount:"", memo:"", store:"", date:todayStr() };
  // 計上月が表示中の月と異なる場合は案内
  if(billing.year !== S.year || billing.month !== S.month){
    const bm = MONTHS[billing.month];
    alert(`日付が${bm}の計上分のため、${billing.year}年${bm}に記録します`);
    await fbAddExpenseToMonth(entry, billing.year, billing.month);
    // 該当月に移動
    selectMonth(billing.year, billing.month);
  } else {
    render();
    await fbAddExpense(entry);
  }
};

window.deleteExpense = async function(id){
  await fbDeleteExpense(id);
};

// ── 支払いメディア管理 ──────────────────
window.addPayment = async function(){
  const label = S.newPay.label.trim();
  if(!label){ alert("名前を入力してください"); return; }
  const newP = { id:"pay_"+Date.now(), label, icon:S.newPay.icon, color:S.newPay.color, bg:S.newPay.bg };
  const updated = [...S.payments, newP];
  S.payments = updated;
  S.newPay = { label:"", icon:"💳", color:"#1A6BB5", bg:"#EFF6FF" };
  renderOpt();
  await fbSavePayments(updated);
};

window.deletePayment = async function(id){
  if(S.payments.length <= 1){ alert("最低1つの支払い方法が必要です"); return; }
  if(!confirm("この支払い方法を削除しますか？")) return;
  const updated = S.payments.filter(p => p.id !== id);
  S.payments = updated;
  if(S.form.payment === id) S.form.payment = updated[0]?.id || "";
  renderOpt();
  render();
  await fbSavePayments(updated);
};

window.setNewPayField = function(f, v){
  S.newPay[f] = v;
  if(f === "color") S.newPay.bg = v + "18";
  renderOpt();
};

window.openOpt = function(){
  document.getElementById("opt-overlay").style.display = "flex";
  renderOpt();
};
window.closeOpt = function(){
  document.getElementById("opt-overlay").style.display = "none";
  render();
};

function render(){
  const el = document.getElementById("mc");
  if(!el) return;
  el.innerHTML = "";
  if(S.view === "month") renderMonth(el);
  else if(S.view === "summary") renderSummary(el);
  else if(S.view === "fixed") renderFixed(el);
}

function renderMonth(el){
  const HIST_ITEMS = ["家賃","電気代","水道代","ガス代","食費"];
  const HIST_ICONS = {家賃:"🏠",電気代:"💡",水道代:"💧",ガス代:"🔥",食費:"🍚"};
  const HIST_COLORS = {家賃:"#3D405B",電気代:"#E8B84B",水道代:"#5A8FA3",ガス代:"#E07A5F",食費:"#5A9E7C"};
  const USERS = [{id:"sasaki",label:"ささき",color:"#FF6B4A"},{id:"yamamo",label:"やまも",color:"#3D8A60"}];

  const list = curList().sort((a,b) => (b.date||"").localeCompare(a.date||""));
  const flist = S.filterPayment === "all" ? list : list.filter(e => e.payment === S.filterPayment);
  const flist2 = S.filterUser === "all" ? flist : flist.filter(e=>(e.user||"sasaki")===S.filterUser);
  const tCat = tByCat(flist2);
  const tPay = tByPay(list);
  const newTotal = flist2.reduce((s,e) => s+e.amount, 0);

  // 過去データ（2026年5月は食費除外）
  const isExcludeMay2026 = (S.year===2026 && S.month===4);
  const histCur  = getHistData(S.year, S.month);
  const histPrevM = S.month===0 ? getHistData(S.year-1,11) : getHistData(S.year,S.month-1);
  const histPrevY = getHistData(S.year-1, S.month);
  const histTotal = histCur ? HIST_ITEMS.reduce((s,k)=>{
    if(isExcludeMay2026 && k==="食費") return s;
    return s+(histCur[k]||0);
  }, 0) : 0;

  // 合計（新規入力＋過去データ）
  const grandTotal = newTotal + histTotal;

  // 前月比・前年比（前月・前年は除外なし）
  const prevMTotal = histPrevM ? HIST_ITEMS.reduce((s,k)=>s+(histPrevM[k]||0),0) : null;
  const prevYTotal = histPrevY ? HIST_ITEMS.reduce((s,k)=>s+(histPrevY[k]||0),0) : null;
  function trendHtml(cur, prev, large=false){
    if(prev===null||prev===0||cur===0) return '<span style="color:#bbb;font-size:11px">—</span>';
    const r=cur/prev; const pct=((r-1)*100).toFixed(1);
    const sz = large?"13px":"11px";
    if(r>1.05) return `<span style="color:#E05555;font-size:${sz};font-weight:700">↑${pct}%</span>`;
    if(r<0.95) return `<span style="color:#3D8A60;font-size:${sz};font-weight:700">↓${Math.abs(pct)}%</span>`;
    return `<span style="color:#999;font-size:${sz}">±0%</span>`;
  }

  const mbtns = MONTHS.map((m,i)=>`<button class="mbtn${S.month===i?" act":""}" onclick="selectMonth(${S.year},${i})">${m}</button>`).join("");
  const yopts = [2023,2024,2025,2026,S.year+1].filter((v,i,a)=>a.indexOf(v)===i).sort().map(y=>`<option value="${y}"${y===S.year?" selected":""}>${y}年</option>`).join("");
  const cbar  = CATEGORIES.filter(c=>tCat[c.id]).map(c=>`<div style="background:${c.color};flex:${tCat[c.id]};border-radius:2px"></div>`).join("");
  const pchips= S.payments.filter(p=>tPay[p.id]).map(p=>`<div class="pchip">${p.icon} ${escH(p.label)} <span style="opacity:.6">${fmt(tPay[p.id])}</span></div>`).join("");

  let fbtn = `<button class="pfbtn" style="background:${S.filterPayment==='all'?'#2C2424':'#fff'};color:${S.filterPayment==='all'?'#fff':'#666'};border-color:${S.filterPayment==='all'?'#2C2424':'#ddd'}" onclick="setFilter('all')">すべて</button>`;
  S.payments.filter(p=>tPay[p.id]).forEach(p=>{
    const a=S.filterPayment===p.id;
    fbtn+=`<button class="pfbtn" style="background:${a?p.color:'#fff'};color:${a?'#fff':p.color};border-color:${p.color}" onclick="setFilter('${p.id}')">${p.icon} ${escH(p.label)}　${fmt(tPay[p.id])}</button>`;
  });

  const tUser={};
  list.forEach(e=>{const u=e.user||"sasaki";tUser[u]=(tUser[u]||0)+e.amount;});
  let ufbtn=`<button class="pfbtn" style="background:${S.filterUser==='all'?'#2C2424':'#fff'};color:${S.filterUser==='all'?'#fff':'#666'};border-color:${S.filterUser==='all'?'#2C2424':'#ddd'}" onclick="setFilterUser('all')">👤 全員</button>`;
  USERS.filter(u=>tUser[u.id]).forEach(u=>{
    const a=S.filterUser===u.id;
    ufbtn+=`<button class="pfbtn" style="background:${a?u.color:'#fff'};color:${a?'#fff':u.color};border-color:${u.color}" onclick="setFilterUser('${u.id}')">${u.label}　${fmt(tUser[u.id])}</button>`;
  });

  const ccards = CATEGORIES.filter(c=>tCat[c.id]).map(c=>`
    <div class="ccard" style="border-left-color:${c.color}">
      <div class="ccard-ico">${c.icon}</div>
      <div class="ccard-lbl">${c.label}</div>
      <div class="ccard-amt">${fmt(tCat[c.id])}</div>
    </div>`).join("");

  const payOpts = S.payments.map(p=>`<option value="${p.id}"${S.form.payment===p.id?" selected":""}>${p.icon} ${escH(p.label)}</option>`).join("");

  // 過去データ行（2026年5月は食費除外）
  let histRows = "";
  if(histCur){
    histRows = HIST_ITEMS.filter(item=>!(isExcludeMay2026 && item==="食費")).map(item=>{
      const v=histCur[item]||0;
      const pm=histPrevM?histPrevM[item]:null;
      const py=histPrevY?histPrevY[item]:null;
      return `
        <div class="litem">
          <div class="lico" style="background:${HIST_COLORS[item]}22">${HIST_ICONS[item]}</div>
          <div class="linf">
            <div class="lname">${item}</div>
            <div class="lmeta">
              <span class="badge" style="background:#F0EBE4;color:#888">過去データ</span>
              <span style="font-size:11px;margin-left:4px">${trendHtml(v,pm)} 前月</span>
              <span style="font-size:11px;margin-left:4px">${trendHtml(v,py)} 前年</span>
            </div>
          </div>
          <div class="lamt">${fmt(v)}</div>
        </div>`;
    }).join("");
  }

  // 新規入力リスト（スワイプ対応）
  const newRowElements = [];
  if(flist2.length>0){
    flist2.forEach(e=>{
      const cat=CATEGORIES.find(c=>c.id===e.category)||{icon:"📦",label:"その他",color:"#888"};
      const pay=S.payments.find(p=>p.id===e.payment)||{icon:"💳",label:e.payment||"",color:"#888",bg:"#eee"};
      const u=e.user||"sasaki";const uc=u==="sasaki"?"#FF6B4A":"#3D8A60";const ul=u==="sasaki"?"ささき":"やまも";
      const inner=`
        <div class="litem">
          <div class="lico" style="background:${cat.color}22">${cat.icon}</div>
          <div class="linf">
            <div class="lname">${e.store?escH(e.store):`<span style="color:#BBB;font-weight:400">${cat.label}</span>`}${e.memo?` <span style="color:#BBB;font-size:11px;font-weight:400">· ${escH(e.memo)}</span>`:""}</div>
            <div class="lmeta">
              <span class="badge" style="background:${pay.bg};color:${pay.color};border:1px solid ${pay.color}44">${pay.icon} ${escH(pay.label)}</span>
              <span class="badge" style="background:${cat.color}18;color:${cat.color}">${cat.label}</span>
              ${e.date?`<span class="ldate">📅 ${fmtDate(e.date)}</span>`:""}
              <span class="user-badge" style="background:${uc}18;color:${uc}">${ul}</span>
            </div>
          </div>
          <div class="lamt">${fmt(e.amount)}</div>
        </div>`;
      newRowElements.push({id:e.id, inner});
    });
  }

  // リスト全体（スワイプ対応DOMで組み立て）
  const buildList = (container) => {
    if(!histCur && flist2.length===0){
      container.innerHTML = `<div class="empty"><div class="empty-ico">📋</div>この月のデータはありません</div>`;
      return;
    }
    const card = document.createElement("div");
    card.className = "lcard";
    // 過去データセクション
    if(histCur){
      card.insertAdjacentHTML("beforeend",`
        <div class="lhdr" style="display:flex;justify-content:space-between;align-items:center">
          <span>過去データ（光熱費・食費）</span>
          <span style="font-weight:700;color:var(--text)">${fmt(histTotal)}</span>
        </div>${histRows}`);
    }
    // 新規入力セクション
    if(newRowElements.length>0){
      card.insertAdjacentHTML("beforeend",`
        <div class="lhdr" style="display:flex;justify-content:space-between;align-items:center;${histCur?'border-top:2px solid #F0EBE4':''}">
          <span>入力済み支出 (${flist2.length}件)</span>
          <span style="font-weight:700;color:var(--text)">${fmt(newTotal)}</span>
        </div>`);
      const swipeHint = document.createElement("div");
      swipeHint.style.cssText="font-size:10px;color:#CCC;text-align:right;padding:3px 14px 0;";
      swipeHint.textContent="← 編集　削除 →";
      card.appendChild(swipeHint);
      newRowElements.forEach(({id,inner})=>{
        card.appendChild(makeSwipeItem(inner, id));
      });
    }
    container.appendChild(card);
  };

  // まずHTMLを挿入してからDOMを操作
  el.insertAdjacentHTML("beforeend", `
    <div class="fu" id="month-fu">
      <div class="mbar">
        <select class="ysel" onchange="selectMonth(Number(this.value),${S.month})">${yopts}</select>
        <div class="mbtns">${mbtns}</div>
      </div>
      <div class="tot-card">
        <div class="tot-lbl">${S.year}年${MONTHS[S.month]} 合計支出</div>
        <div class="tot-num">${fmt(grandTotal)}</div>
        ${grandTotal>0?`<div class="cbar">${cbar}</div>`:''}
        ${grandTotal>0?`
        <div style="display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;font-size:12px;opacity:.75">
          ${trendHtml(grandTotal,prevMTotal,true)} 前月比
          ${trendHtml(grandTotal,prevYTotal,true)} 前年比
        </div>`:''}
        ${list.length>0?`<div class="pchips">${pchips}</div>`:''}
      </div>
      <div class="fcard">
        <div class="flbl">支出を追加</div>
        <div class="frow">
          <select class="fi fi-cat" onchange="formChange('category',this.value)">
            ${CATEGORIES.map(c=>`<option value="${c.id}"${S.form.category===c.id?" selected":""}>${c.icon} ${c.label}</option>`).join("")}
          </select>
          <input class="fi fi-amt" type="number" inputmode="numeric" placeholder="金額 (円)"
            value="${escA(S.form.amount)}" oninput="formChange('amount',this.value)"
            onkeydown="if(event.key==='Enter')addExpense()" />
          <input class="fi fi-memo" type="text" placeholder="メモ (任意)"
            value="${escA(S.form.memo)}" oninput="formChange('memo',this.value)"
            onkeydown="if(event.key==='Enter')addExpense()" />
        </div>
        <div class="frow">
          <input class="fi fi-store" type="text" placeholder="🏪 購入店舗 (任意)"
            value="${escA(S.form.store)}" oninput="formChange('store',this.value)"
            onkeydown="if(event.key==='Enter')addExpense()" />
          <select class="fi fi-pay" onchange="formChange('payment',this.value)">${payOpts}</select>
        </div>
        <div class="frow">
          <input class="fi fi-date" type="date" value="${escA(S.form.date)}" oninput="formChange('date',this.value)" style="flex:1 1 130px" />
          <select class="fi" style="flex:0 0 auto" onchange="formChange('user',this.value)">
            <option value="sasaki"${S.form.user==='sasaki'?' selected':''}>👤 ささき</option>
            <option value="yamamo"${S.form.user==='yamamo'?' selected':''}>👤 やまも</option>
          </select>
          <button class="add-btn" onclick="addExpense()" style="flex:1 1 70px">追加</button>
        </div>
      </div>
      ${(list.length>0)?`<div class="pfwrap">${fbtn}</div>`:''}
      ${(list.length>0)?`<div class="pfwrap">${ufbtn}</div>`:''}
      ${ccards?`<div class="cgrid">${ccards}</div>`:''}
      <div id="list-container"></div>
      <div style="font-size:11px;color:var(--muted);text-align:center;padding:6px 0 2px">
        ※ 締め日：毎月17日（前月18日〜当月17日）
      </div>
    </div>
  `);
  buildList(document.getElementById("list-container"));
}

function renderSummary(el){
  const HIST_ITEMS = ["家賃","電気代","水道代","ガス代","食費"];
  const HIST_ICONS = {家賃:"🏠",電気代:"💡",水道代:"💧",ガス代:"🔥",食費:"🍚"};
  const HIST_COLORS = {家賃:"#3D405B",電気代:"#E8B84B",水道代:"#5A8FA3",ガス代:"#E07A5F",食費:"#5A9E7C"};

  // 過去データ月合計（2026年5月は食費除外）
  function histMonthTotal(year, month){
    const d = getHistData(year, month);
    if(!d) return 0;
    const exclude = (year===2026 && month===4); // 5月=index4
    return HIST_ITEMS.reduce((s,k)=>{
      if(exclude && k==="食費") return s;
      return s+(d[k]||0);
    }, 0);
  }

  // 各月：過去データ＋Firebase新規入力の合算
  const summary = Array.from({length:12},(_,m)=>{
    const newList = Object.values(S.expenses[`${S.year}-${m}`]||{});
    const newTotal = newList.reduce((s,e)=>s+e.amount,0);
    const histT = histMonthTotal(S.year, m);
    const total = newTotal + histT;

    // カテゴリ内訳（新規入力分のみ）
    const byCat = {};
    newList.forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+e.amount;});

    // 過去データ内訳チップ用
    const histD = getHistData(S.year, m);
    const exclude = (S.year===2026 && m===4);

    return {month:m, total, newTotal, histT, byCat, histD, exclude};
  });

  const yTotal = summary.reduce((s,m)=>s+m.total,0);
  const prevYTotal = Array.from({length:12},(_,m)=>histMonthTotal(S.year-1,m)).reduce((s,v)=>s+v,0);
  const maxM = Math.max(...summary.map(m=>m.total),1);

  // 年間の全月データを非同期購読
  for(let m=0;m<12;m++){
    const key=`${S.year}-${m}`;
    if(!S.expenses[key]){
      if(firebaseReady){
        const colRef=db.collection("expenses").doc(key).collection("items");
        colRef.onSnapshot(snap=>{
          S.expenses[key]={};
          snap.forEach(d=>{S.expenses[key][d.id]=d.data();});
          if(S.view==="summary") render();
        });
      }
    }
  }

  const yopts = [2023,2024,2025,2026,S.year+1].filter((v,i,a)=>a.indexOf(v)===i).sort()
    .map(y=>`<option value="${y}"${y===S.year?" selected":""}>${y}年</option>`).join("");

  // 棒グラフ
  const bars = summary.map((m,i)=>`
    <div class="bcol" onclick="selectMonth(${S.year},${i});setView('month')">
      <div class="bval">${m.total>0?Math.round(m.total/10000)+"万":""}</div>
      <div class="bbody" style="background:${i===S.month?"#FF8C69":"#4A3C3C"};height:${m.total>0?Math.max(4,(m.total/maxM)*88):3}px"></div>
      <div class="blbl" style="color:${i===S.month?"#FF8C69":"#888"}">${i+1}月</div>
    </div>`).join("");

  // 月別テーブル行
  const rows = summary.map((m,i)=>{
    // 過去データチップ
    let chips = "";
    if(m.histD){
      HIST_ITEMS.forEach(k=>{
        if(m.exclude && k==="食費") return;
        if(m.histD[k]) chips+=`<span class="badge" style="background:${HIST_COLORS[k]}22;color:${HIST_COLORS[k]}">${HIST_ICONS[k]} ${fmt(m.histD[k])}</span>`;
      });
    }
    // 新規入力チップ
    CATEGORIES.filter(c=>m.byCat[c.id]).forEach(c=>{
      chips+=`<span class="badge" style="background:${c.color}22;color:${c.color}">${c.icon} ${fmt(m.byCat[c.id])}</span>`;
    });
    if(!chips) chips=`<span style="font-size:11px;color:#ccc">データなし</span>`;

    return `<div class="yrow${i===S.month?" sel":""}" onclick="selectMonth(${S.year},${i});setView('month')">
      <div class="yrm" style="color:${i===S.month?"var(--acc2)":"var(--muted)"}">${MONTHS[i]}</div>
      <div class="yrchips">${chips}</div>
      <div style="text-align:right;flex-shrink:0">
        <div class="yrtot" style="color:${m.total>0?"var(--text)":"#ccc"}">${m.total>0?fmt(m.total):"—"}</div>
        ${m.exclude?'<div style="font-size:9px;color:#FF8C69">食費除外</div>':''}
      </div>
    </div>`;
  }).join("");

  // 前年比
  const yoyHtml = prevYTotal>0
    ? (()=>{const r=yTotal/prevYTotal;const p=((r-1)*100).toFixed(1);
        return r>1.05?`<span style="color:#E05555;font-size:12px;font-weight:700">↑${p}% 前年比</span>`
              :r<0.95?`<span style="color:#3D8A60;font-size:12px;font-weight:700">↓${Math.abs(p)}% 前年比</span>`
              :`<span style="color:#999;font-size:12px">±0% 前年比</span>`;})()
    : "";

  el.insertAdjacentHTML("beforeend",`
    <div class="fu">
      <div class="mbar" style="margin-bottom:14px">
        <select class="ysel" onchange="S.year=Number(this.value);render()">${yopts}</select>
      </div>
      <div class="ycrd">
        <div class="tot-lbl">${S.year}年 年間合計（過去データ＋入力済み）</div>
        <div class="tot-num">${fmt(yTotal)}</div>
        <div style="font-size:12px;opacity:.5;margin-top:5px;display:flex;gap:14px;flex-wrap:wrap">
          <span>月平均 ${fmt(Math.round(yTotal/12))}</span>
          ${yoyHtml}
        </div>
      </div>
      <div class="fcard" style="margin-bottom:13px">
        <div class="flbl">月別支出グラフ</div>
        <div class="barchart">${bars}</div>
      </div>
      <div class="ytbl">${rows}</div>
      <div style="font-size:11px;color:var(--muted);text-align:center;padding:6px 0 2px">
        ※ 2026年5月はスプレッドシートの食費を除外　／　締め日：毎月17日
      </div>
    </div>
  `);
}

// ══════════════════════════════════════════
//  固定費ビュー
// ══════════════════════════════════════════
function renderFixed(el){
  const rows = FIXED_COSTS.map(c=>`
    <div class="fixed-row">
      <div class="fixed-ico" style="background:${c.color}22">${c.icon}</div>
      <div class="fixed-name">${c.label}</div>
      <div class="fixed-amt">${fmt(c.amount)}</div>
      <div style="font-size:11px;color:var(--muted);min-width:60px;text-align:right">月額</div>
    </div>`).join("");

  el.insertAdjacentHTML("beforeend",`
    <div class="fu">
      <!-- 合計カード -->
      <div class="tot-card" style="margin-bottom:14px">
        <div class="tot-lbl">固定費 月額合計</div>
        <div class="tot-num">${fmt(FIXED_TOTAL)}</div>
        <div style="font-size:12px;opacity:.6;margin-top:8px;display:flex;gap:16px;flex-wrap:wrap">
          <span>1人あたり <strong>${fmt(Math.round(FIXED_TOTAL/2))}</strong></span>
          <span>年間 <strong>${fmt(FIXED_TOTAL*12)}</strong></span>
        </div>
      </div>

      <!-- 固定費一覧 -->
      <div class="fixed-card">
        <div class="flbl" style="margin-bottom:8px">毎月の固定費</div>
        ${rows}
      </div>

      <!-- 変動費との合計 -->
      <div class="fixed-card" style="background:linear-gradient(135deg,#FFF5F0,#FFE8DF)">
        <div class="flbl" style="margin-bottom:10px">今月の概算合計（固定＋変動）</div>
        ${(()=>{
          const cur = getHistData(S.year, S.month);
          const exclude = (S.year===2026 && S.month===4);
          const varTotal = cur ? ["電気代","水道代","ガス代","食費"].reduce((s,k)=>{
            if(exclude && k==="食費") return s;
            return s+(cur[k]||0);
          },0) : null;
          const grand = varTotal !== null ? FIXED_TOTAL + varTotal : null;
          return `
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="color:var(--muted);font-size:13px">固定費</span>
            <span style="font-weight:700">${fmt(FIXED_TOTAL)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:10px">
            <span style="color:var(--muted);font-size:13px">変動費（過去データ）${exclude?'<span style="color:#FF8C69">※食費除外</span>':''}</span>
            <span style="font-weight:700">${varTotal!==null?fmt(varTotal):"—"}</span>
          </div>
          <div style="height:1px;background:var(--border);margin-bottom:10px"></div>
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:15px;font-weight:700">合計</span>
            <span style="font-size:20px;font-weight:700;color:var(--acc2)">${grand!==null?fmt(grand):"—"}</span>
          </div>
          <div style="text-align:right;font-size:12px;color:var(--muted);margin-top:4px">1人あたり ${grand!==null?fmt(Math.round(grand/2)):"—"}</div>`;
        })()}
      </div>

      <div style="font-size:11px;color:var(--muted);text-align:center;padding:8px 0">
        固定費の変更はオプション（⚙️）から行えます（近日対応予定）
      </div>
    </div>
  `);
}

// ══════════════════════════════════════════
//  起動
// ══════════════════════════════════════════
function showApp(){
  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "flex";
  render();
}

async function init(){
  // 前回の入力者を復元
  try{
    const savedUser = localStorage.getItem("kakeimemo_user");
    if(savedUser){ S.form.user = savedUser; }
  }catch(e){}
  // 3秒以内にFirebase接続できなくてもアプリを起動する
  const timeout = setTimeout(()=>{
    setSyncStatus(false);
    showApp();
  }, 3000);

  try {
    // 支払いメディアを購読
    subscribePayments();
    // 当月を購読
    subscribeMonth(S.year, S.month);
    // 初回データ取得を少し待ってから起動
    setTimeout(()=>{
      clearTimeout(timeout);
      showApp();
    }, 1000);
  } catch(e) {
    clearTimeout(timeout);
    setSyncStatus(false);
    showApp();
  }
}

init();
</script>
</body>
</html>
